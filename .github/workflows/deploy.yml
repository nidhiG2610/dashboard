name: Deploy Dashboard to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Step 1: Checkout code
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------------
      # Step 2: Deploy via SSH
      # -----------------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "SSH connection successful!"

            # -----------------------------
            # Ensure project directories exist
            # -----------------------------
            mkdir -p ~/dashboard/backend
            mkdir -p ~/dashboard/frontend


            # -----------------------------
            # Backend (Laravel) Deployment
            # -----------------------------
            if [ -d .git ]; then
              echo "Backend repo exists, pulling latest changes..."
              git pull origin main
            else
              echo "Cloning backend repo..."
              git clone git@github.com:nidhiG2610/dashboard.git .
            fi
            
            # Install Composer if not exists
            if ! command -v composer &> /dev/null
            then
              echo "Installing Composer..."
              curl -sS https://getcomposer.org/installer | php
              sudo mv composer.phar /usr/local/bin/composer
            fi

            composer install --no-dev --optimize-autoloader
            php artisan migrate --force

            # -----------------------------
            # Frontend (React TS + Tailwind) Deployment
            # -----------------------------
            cd ~/dashboard/frontend || mkdir -p ~/dashboard/frontend && cd ~/dashboard/frontend
            if [ -d .git ]; then
              echo "Frontend repo exists, pulling latest changes..."
              git pull origin main
            else
              echo "Cloning frontend repo..."
              git clone git@github.com:nidhiG2610/dashboard.git .
            fi
            
            # Install Node.js if not exists
              if ! command -v node &> /dev/null
              then
                echo "Installing Node.js..."
                curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
                sudo apt install -y nodejs
              fi

              npm install
              npm run build

              # No need to copy build files, Vite already outputs to backend/public/build
              echo "Frontend build completed to backend/public/build"


              # -----------------------------
              # Restart Laravel worker - Setup not completed yet
              # -----------------------------
              # if systemctl list-units --full -all | grep -q "laravel-worker.service"; then
              #  sudo systemctl restart laravel-worker.service
              # else
              #  echo "laravel-worker.service not found. Please create it on EC2."
              # fi
