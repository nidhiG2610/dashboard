name: Deploy Dashboard to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Step 1: Checkout code
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------------
      # Step 2: Deploy via SSH
      # -----------------------------
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # -----------------------------
            # Backend (Laravel) Deployment
            # -----------------------------
            cd ~/dashboard/backend || mkdir -p ~/dashboard/backend && cd ~/dashboard/backend
            git pull origin main || git clone https://github.com/USERNAME/REPO_NAME.git .
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force

            # -----------------------------
            # Frontend (React TS + Tailwind) Deployment
            # -----------------------------
            cd ~/dashboard/frontend || mkdir -p ~/dashboard/frontend && cd ~/dashboard/frontend
            git pull origin main || git clone https://github.com/USERNAME/REPO_NAME.git .
            npm install
            npm run build

            # Copy frontend build to Laravel public folder
            # Use 'build' if Create React App, 'dist' if Vite
            cp -r build/* ~/dashboard/backend/public/

            # -----------------------------
            # Restart Laravel worker
            # -----------------------------
            sudo systemctl restart laravel-worker.service
