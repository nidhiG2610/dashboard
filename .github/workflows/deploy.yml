name: Deploy Dashboard to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo (needed only if you use local files)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: SSH deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "=== Step 1: Remove old dashboard folder ==="
            sudo rm -rf ~/dashboard
            mkdir -p ~/dashboard

            echo "=== Step 2: Clone repository fresh ==="
            cd ~/dashboard
            git clone git@github.com:nidhiG2610/dashboard.git .

            # Fix permissions so EC2 user can write files
            sudo chown -R $USER:$USER ~/dashboard

            # -----------------------------
            # Backend (Laravel)
            # -----------------------------
            echo "=== Step 3: Backend deployment ==="
            cd ~/dashboard/backend

            # Install Composer if missing
            if ! command -v composer &> /dev/null
            then
              echo "Installing Composer..."
              curl -sS https://getcomposer.org/installer | php
              sudo mv composer.phar /usr/local/bin/composer
            fi

            composer install --no-dev --optimize-autoloader
            php artisan migrate --force

            # -----------------------------
            # Frontend (React + Vite)
            # -----------------------------
            echo "=== Step 4: Frontend deployment ==="
            cd ~/dashboard/frontend

            # Install Node.js if missing
            if ! command -v node &> /dev/null
            then
              echo "Installing Node.js..."
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt install -y nodejs
            fi

            # Fix permissions to avoid npm EACCES errors
            sudo chown -R $USER:$USER .

            npm install
            npm run build
            echo "Frontend build complete (Vite outDir = backend/public/build)"

            # -----------------------------
            # NGINX deployment
            # -----------------------------
            echo "=== Step 5: NGINX setup ==="
            cd ~/dashboard/nginx
            NGINX_SOURCE=~/dashboard/nginx/dashboard.conf
            NGINX_DEST=/etc/nginx/sites-available/dashboard

            if [ -f "$NGINX_SOURCE" ]; then
              sudo cp "$NGINX_SOURCE" "$NGINX_DEST"
              sudo ln -sf "$NGINX_DEST" /etc/nginx/sites-enabled/dashboard
              sudo nginx -t && sudo systemctl restart nginx
              echo "NGINX deployed and restarted successfully"
            else
              echo "No NGINX config found in dashboard/nginx, skipping NGINX deployment."
            fi
