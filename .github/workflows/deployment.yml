name: Deploy Dashboard to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code in Actions runner (not the EC2 instance yet)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Deploy via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== Step 1: Remove old dashboard folder and create fresh ==="

            sudo rm -rf /var/www/dashboard
            # rm -rf /var/www/dashboard/backend/public/build
            sudo mkdir -p /var/www/dashboard
            WEB_USER="www-data"
            SSH_USER="ubuntu"
            sudo chown -R $SSH_USER:$WEB_USER /var/www/dashboard

            echo "=== Step 2: Clone repository via HTTPS using PAT ==="
            cd /var/www/dashboard
            git clone https://${{ secrets.GH_PAT }}@github.com/nidhiG2610/dashboard.git .

            #---------------------
            # Restore .env
            #---------------------
            echo "Restoring .env..."
            cp /home/ubuntu/.env backend/.env

            # -----------------------------
            # Step 3: Install PHP & Extensions
            # -----------------------------
            echo "=== Installing PHP and required extensions ==="
            sudo apt update
            sudo apt install -y php-sqlite3 php-pdo-sqlite php-cli php-mbstring php-xml php-curl
                    
            # -----------------------------
            # Step 4: Backend (Laravel)
            # -----------------------------
            echo "=== Backend deployment ==="
            cd /var/www/dashboard/backend
            echo "=== in backend ==="

            # Set ownership to SSH user BEFORE running Composer
            sudo chown -R $SSH_USER:$WEB_USER /var/www/dashboard/backend
            sudo chmod -R 775 /var/www/dashboard/backend
            chmod 600 /var/www/dashboard/backend/.env
            echo "=== Backend permissions set for installation ==="         

            # Install Composer if missing
            if ! command -v composer &> /dev/null; then
                echo "Installing Composer..."
                sudo curl -sS https://getcomposer.org/installer | php
                sudo mv composer.phar /usr/local/bin/composer
            fi
            
            echo "=== Installing Composer dependencies ==="
            df -h
            composer clear-cache
            composer self-update

            # Ensure unzip is installed for faster archive extraction
            sudo apt install -y unzip

            # Install with retry logic
            composer install --no-interaction --optimize-autoloader --prefer-dist || \
              (echo "First attempt failed, retrying..." && composer install --no-interaction --optimize-autoloader --prefer-dist)

            php artisan migrate --force

            sudo chown -R www-data:www-data /var/www/dashboard/backend/storage
            sudo chown -R www-data:www-data /var/www/dashboard/backend/bootstrap/cache
            echo "=== in backend updating permisson step- 1 finished ==="

            sudo chmod -R 775 /var/www/dashboard/backend/storage
            sudo chmod -R 775 /var/www/dashboard/backend/bootstrap/cache
            chmod 600 /var/www/dashboard/backend/.env
            echo "=== in backend updating permisson step- 2 finished ==="          

            # -----------------------------
            # Step 5: Install Node 20+ for frontend
            # -----------------------------
            echo "=== Installing Node.js 20+ ==="
            sudo apt install nodejs -y
            node -v
            npm -v

            # -----------------------------
            # Step 6: Frontend (React + Vite)
            # -----------------------------
            echo "=== Frontend deployment ==="
            cd /var/www/dashboard
            npm install
            npm run build

            # Copy frontend build to Laravel public folder
            mkdir -p /var/www/dashboard/backend/public/build
            echo "Frontend build copied to Laravel public/build"

            # -----------------------------
            # Fix permissions - @dep
            # -----------------------------
            # echo "=== Step 6: Fix permissions ==="
            # sudo chown -R www-data:www-data /var/www/dashboard/backend
            # sudo find /var/www/dashboard/backend -type d -exec chmod 755 {} \;
            # sudo find /var/www/dashboard/backend -type f -exec chmod 644 {} \;
            # sudo chmod -R 775 /var/www/dashboard/backend/storage /var/www/dashboard/backend/bootstrap/cache


            # -----------------------------
            # Step 7: Nginx setup
            # -----------------------------
            echo "=== Nginx deployment ==="
            cd /var/www/dashboard/nginx
            NGINX_SOURCE=/var/www/dashboard/nginx/dashboard.conf
            NGINX_DEST=/etc/nginx/sites-available/dashboard

            if [ -f "$NGINX_SOURCE" ]; then
                sudo cp "$NGINX_SOURCE" "$NGINX_DEST"
                sudo ln -sf "$NGINX_DEST" /etc/nginx/sites-enabled/dashboard
                sudo nginx -t && sudo systemctl restart nginx
                echo "NGINX deployed and restarted successfully"
            else
                echo "No NGINX config found in dashboard/nginx, skipping NGINX deployment."
            fi
