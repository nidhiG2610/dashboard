name: Deploy Dashboard to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code in Actions runner (not the EC2 instance yet)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Deploy via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "=== Step 1: Remove old dashboard folder and create fresh ==="

            rm -rf /home/ubuntu/dashboard
            # rm -rf /home/ubuntu/dashboard/backend/public/build
            mkdir -p /home/ubuntu/dashboard

            echo "=== Step 2: Clone repository via HTTPS using PAT ==="
            cd /home/ubuntu/dashboard
            git clone https://${{ secrets.GH_PAT }}@github.com/nidhiG2610/dashboard.git .
            WEB_USER="www-data"
            SSH_USER="ubuntu"
            sudo chown -R $SSH_USER:$WEB_USER /home/ubuntu/dashboard

            #---------------------
            # Restore .env
            #---------------------
            echo "Restoring .env..."
            cp /home/ubuntu/.env backend/.env

            # -----------------------------
            # Step 3: Install PHP & Extensions
            # -----------------------------
            echo "=== Installing PHP and required extensions ==="
            sudo apt update
            sudo apt install -y php8.3-cli php8.3-fpm php8.3-curl php8.3-mbstring php8.3-xml php8.3-bcmath php8.3-mysql unzip curl git

            # Install Composer if missing
            if ! command -v composer &> /dev/null; then
                echo "Installing Composer..."
                curl -sS https://getcomposer.org/installer | php
                mv composer.phar /usr/local/bin/composer
            fi

            # -----------------------------
            # Step 4: Backend (Laravel)
            # -----------------------------
            echo "=== Backend deployment ==="
            cd /home/ubuntu/dashboard/backend
            echo "=== in backend ==="

            find . -type f -exec chmod 644 {} \;
            find . -type f -exec chmod 755 {} \;
            echo "=== in backend updating permisson step- 1 finished ==="

            chmod -R 775 /home/ubuntu/dashboard/backend/storage
            chmod -R 775 /home/ubuntu/dashboard/bootstrap/cache
            chmod 600 /home/ubuntu/dashboard/backend/.env
            echo "=== in backend updating permisson step- 2 finished ==="

            composer install --no-dev --optimize-autoloader
            php artisan migrate --force

            # -----------------------------
            # Step 5: Install Node 20+ for frontend
            # -----------------------------
            echo "=== Installing Node.js 20+ ==="
            sudo apt remove -y nodejs || true
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt install -y nodejs
            node -v
            npm -v

            # -----------------------------
            # Step 6: Frontend (React + Vite)
            # -----------------------------
            echo "=== Frontend deployment ==="
            cd /home/ubuntu/dashboard/frontend
            npm install
            npm run build

            # Copy frontend build to Laravel public folder
            mkdir -p /home/ubuntu/dashboard/backend/public/build
            echo "Frontend build copied to Laravel public/build"

            # -----------------------------
            # Fix permissions - @dep
            # -----------------------------
            # echo "=== Step 6: Fix permissions ==="
            # sudo chown -R www-data:www-data /home/ubuntu/dashboard/backend
            # sudo find /home/ubuntu/dashboard/backend -type d -exec chmod 755 {} \;
            # sudo find /home/ubuntu/dashboard/backend -type f -exec chmod 644 {} \;
            # sudo chmod -R 775 /home/ubuntu/dashboard/backend/storage /home/ubuntu/dashboard/backend/bootstrap/cache


            # -----------------------------
            # Step 7: Nginx setup
            # -----------------------------
            echo "=== Nginx deployment ==="
            cd /home/ubuntu/dashboard/nginx
            NGINX_SOURCE=/home/ubuntu/dashboard/nginx/dashboard.conf
            NGINX_DEST=/etc/nginx/sites-available/dashboard

            if [ -f "$NGINX_SOURCE" ]; then
                sudo cp "$NGINX_SOURCE" "$NGINX_DEST"
                sudo ln -sf "$NGINX_DEST" /etc/nginx/sites-enabled/dashboard
                sudo nginx -t && sudo systemctl restart nginx
                echo "NGINX deployed and restarted successfully"
            else
                echo "No NGINX config found in dashboard/nginx, skipping NGINX deployment."
            fi
