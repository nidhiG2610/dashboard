name: Deploy Dashboard to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code in Actions runner (not the EC2 instance yet)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Deploy backend & frontend
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            
            # -----------------------------
            # Variables
            # -----------------------------
            DEPLOY_DIR=/var/www/dashboard
            BACKEND_DIR=$DEPLOY_DIR/backend
            FRONTEND_DIR=$DEPLOY_DIR/frontend
            SSH_USER="ubuntu"
            WEB_USER="www-data"

            # -----------------------------
            # Step 1: Ensure deployment directories exist
            # -----------------------------
            if [ ! -d "$DEPLOY_DIR" ]; then
                echo "Directory $DEPLOY_DIR does not exist. Creating..."
                sudo mkdir -p "$DEPLOY_DIR"
                sudo chown -R $SSH_USER:$WEB_USER "$DEPLOY_DIR"
            else
                echo "Directory $DEPLOY_DIR already exists. Skipping creation."
            fi

            # Fix permissions before Git operations
            sudo chown -R $SSH_USER:$WEB_USER $DEPLOY_DIR
            sudo chmod -R u+w $DEPLOY_DIR

            cd $DEPLOY_DIR

            # -----------------------------
            # Step 2: Git update
            # -----------------------------
            if [ -d ".git" ]; then
                echo "Repo exists, pulling latest changes..."
                git fetch --all
                git reset --hard origin/master
                echo "Existing repo, hence do not restoring env."
            else
                echo "Cloning repository for the first time..."
                git clone https://${{ secrets.GH_PAT }}@github.com/nidhiG2610/dashboard.git .
                echo "Restoring .env..."
                cp /home/ubuntu/.env backend/.env
            fi       

            # -----------------------------
            # Step 3: Install PHP & Extensions
            # -----------------------------
            echo "Installing PHP extensions..."
            sudo apt update
            sudo apt install -y php-sqlite3 php-pdo-sqlite php-cli php-mbstring php-xml php-curl unzip
               
            # -----------------------------
            # Step 4: Backend (Laravel)
            # -----------------------------
            cd $BACKEND_DIR
            sudo chown -R $SSH_USER:$WEB_USER $BACKEND_DIR
            sudo chmod -R 775 $BACKEND_DIR
            chmod 600 .env           

            # Install Composer if missing
            if ! command -v composer &> /dev/null; then
                echo "Installing Composer..."
                sudo curl -sS https://getcomposer.org/installer | php
                sudo mv composer.phar /usr/local/bin/composer
            fi
            
            echo "Installing Composer dependencies..."
            composer install --no-interaction --optimize-autoloader --prefer-dist || \
              (echo "Retrying composer install..." && composer install --no-interaction --optimize-autoloader --prefer-dist)

            php artisan migrate --force

            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            
            # -----------------------------
            # Step 5: Install Node 20+ for frontend: React + Vite
            # -----------------------------
            echo "Installing Node.js and building frontend..."
            sudo apt install -y nodejs npm

            cd $DEPLOY_DIR
            npm install
            npm run build

            # Ensure frontend build folder exists
            FRONTEND_BUILD_DIR=$BACKEND_DIR/public/build
            if [ ! -d "$FRONTEND_BUILD_DIR" ]; then
                echo "Creating frontend build directory..."
                mkdir -p "$FRONTEND_BUILD_DIR"
            fi
            echo "Frontend build copied to Laravel public/build"
      
      # Step 3: Nginx deployment
      - name: Deploy Nginx
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            DEPLOY_DIR=/var/www/dashboard
            NGINX_SOURCE=$DEPLOY_DIR/nginx/dashboard.conf
            NGINX_DEST=/etc/nginx/sites-available/dashboard

            if [ -f "$NGINX_SOURCE" ]; then
                sudo cp "$NGINX_SOURCE" "$NGINX_DEST"
                sudo ln -sf "$NGINX_DEST" /etc/nginx/sites-enabled/dashboard
                sudo nginx -t && sudo systemctl restart nginx
                echo "NGINX deployed and restarted successfully"
            else
                echo "No NGINX config found, skipping deployment."
            fi
